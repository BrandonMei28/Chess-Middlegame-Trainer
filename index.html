<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Middlegame Chess Trainer - Stockfish</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  #board-container {
    position: relative;
    width: 480px;
    height: 480px;
    margin-bottom: 10px;
  }
  #board {
    width: 480px;
    height: 480px;
  }
  #arrowCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 480px;
    height: 480px;
    pointer-events: none;
  }
  #controls {
    margin-bottom: 10px;
  }
  button {
    margin: 2px;
  }
  #moveList {
    max-height: 150px;
    overflow-y: auto;
    border: 1px solid #ccc;
    width: 480px;
    padding: 5px;
    margin-bottom: 10px;
    font-size: 14px;
  }
  #result {
    font-size: 20px;
    font-weight: bold;
    margin-top: 10px;
    color: green;
  }
  .highlight-square {
    box-shadow: inset 0 0 0 3px yellow;
  }
</style>
<link rel="stylesheet" href="https://unpkg.com/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
</head>
<body>

<h2>Middlegame Chess Trainer - Stockfish 10 Moves</h2>

<div id="controls">
  <button id="generateStockfishBtn">Generate Middlegame (10 Moves)</button>
  <button id="resignBtn" style="display:none;">Resign</button>
  <label>Side:
    <select id="sideSelect">
      <option value="w">White</option>
      <option value="b">Black</option>
    </select>
  </label>
  <label>Difficulty:
    <select id="levelSelect">
      <option value="1">Easy</option>
      <option value="5">Medium</option>
      <option value="10">Hard</option>
      <option value="20">Expert</option>
    </select>
  </label>
  <button id="analyzeBtn" style="display:none;">Analyze Game</button>
</div>

<div id="board-container">
  <div id="board"></div>
  <canvas id="arrowCanvas" width="480" height="480"></canvas>
</div>

<div id="moveList"></div>
<div id="result"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.5/chess.min.js"></script>
<script src="https://unpkg.com/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
// --------- Variables ---------
let board, game;
let stockfish;
let userColor = 'w';
let arrows = [];
let isRightMouseDown = false;
let arrowStart = null;

const canvas = document.getElementById('arrowCanvas');
const ctx = canvas.getContext('2d');
const boardSize = 480;
const squareSize = boardSize / 8;
const resultEl = document.getElementById('result');
const moveListEl = document.getElementById('moveList');

// --------- Helper Functions ---------
function squareToCoords(sq) {
  const file = sq.charCodeAt(0) - 'a'.charCodeAt(0);
  const rank = 8 - parseInt(sq[1], 10);
  return {
    x: file * squareSize + squareSize / 2,
    y: rank * squareSize + squareSize / 2
  };
}

function drawArrows() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  arrows.forEach(a => {
    const from = squareToCoords(a.from);
    const to = squareToCoords(a.to);
    drawArrow(from.x, from.y, to.x, to.y);
  });
}

function drawArrow(fromX, fromY, toX, toY) {
  const headlen = 10;
  const dx = toX - fromX;
  const dy = toY - fromY;
  const angle = Math.atan2(dy, dx);
  ctx.strokeStyle = 'red';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(fromX, fromY);
  ctx.lineTo(toX, toY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(toX, toY);
  ctx.lineTo(
    toX - headlen * Math.cos(angle - Math.PI / 6),
    toY - headlen * Math.sin(angle - Math.PI / 6)
  );
  ctx.lineTo(
    toX - headlen * Math.cos(angle + Math.PI / 6),
    toY - headlen * Math.sin(angle + Math.PI / 6)
  );
  ctx.closePath();
  ctx.fillStyle = 'red';
  ctx.fill();
}

function clearHighlights() {
  const squares = document.querySelectorAll('#board .square-55d63');
  squares.forEach(sq => {
    sq.classList.remove('highlight-square');
  });
}

function highlightMove(from, to) {
  clearHighlights();
  const fromEl = document.querySelector('.square-' + from);
  const toEl = document.querySelector('.square-' + to);
  if (fromEl) fromEl.classList.add('highlight-square');
  if (toEl) toEl.classList.add('highlight-square');
}

// --------- Init Functions ---------
function initStockfish() {
  // Use Stockfish WASM build from jsDelivr
  stockfish = new Worker('https://cdn.jsdelivr.net/gh/niklasf/stockfish.js/stockfish.js');
}

function initBoard() {
  game = new Chess();
  board = Chessboard('board', {
    draggable: true,
    position: 'start',
    orientation: 'white',
    onDragStart: onDragStart,
    onDrop: onDrop,
    onSnapEnd: onSnapEnd
  });

  const boardEl = document.getElementById('board-container');

  boardEl.addEventListener('contextmenu', e => e.preventDefault());

  boardEl.addEventListener('mousedown', e => {
    if (e.button === 2) {
      isRightMouseDown = true;
      const sqClass = e.target.className.split(' ').find(c => c.indexOf('square-') === 0);
      if (sqClass) {
        arrowStart = sqClass.replace('square-', '');
      }
    }
  });

  boardEl.addEventListener('mouseup', e => {
    if (isRightMouseDown && arrowStart) {
      const sqClass = e.target.className.split(' ').find(c => c.indexOf('square-') === 0);
      if (sqClass) {
        const sq = sqClass.replace('square-', '');
        if (sq && arrowStart !== sq) {
          const index = arrows.findIndex(a => a.from === arrowStart && a.to === sq);
          if (index !== -1) {
            arrows.splice(index, 1);
          } else {
            arrows.push({ from: arrowStart, to: sq });
          }
          drawArrows();
        }
      }
    }
    isRightMouseDown = false;
    arrowStart = null;
  });
}

// --------- Chessboard Logic ---------
function onDragStart(source, piece) {
  // block moving pieces when game over
  if (game.game_over()) return false;

  // only allow moves for the side to move AND the user's chosen color
  const turn = game.turn();
  if (turn !== userColor) return false;

  if ((turn === 'w' && piece.search(/^b/) !== -1) ||
      (turn === 'b' && piece.search(/^w/) !== -1)) {
    return false;
  }
}

function onDrop(source, target) {
  clearHighlights();
  const move = game.move({ from: source, to: target, promotion: 'q' });
  if (!move) return 'snapback';

  updateMoveList();
  board.position(game.fen());
  checkGameOver();

  if (!game.game_over()) {
    // Now it's engine's turn
    setTimeout(makeStockfishMove, 200);
  }
}

function onSnapEnd() {
  board.position(game.fen());
}

function updateMoveList() {
  const history = game.history({ verbose: true });
  moveListEl.innerHTML = '';
  history.forEach((m, i) => {
    const moveEl = document.createElement('div');
    const moveNumber = Math.floor(i / 2) + 1;
    const prefix = (i % 2 === 0) ? moveNumber + '. ' : moveNumber + '... ';
    moveEl.innerText = prefix + m.san;
    moveEl.style.cursor = 'pointer';
    moveEl.addEventListener('click', () => highlightMove(m.from, m.to));
    moveListEl.appendChild(moveEl);
  });
}

function engineOnMessageForPlay(e) {
  const line = e.data;
  if (typeof line !== 'string') return;
  if (line.startsWith('bestmove')) {
    const parts = line.split(' ');
    const moveStr = parts[1];
    if (moveStr === '(none)' || moveStr === 'none') return;
    const from = moveStr.slice(0, 2);
    const to = moveStr.slice(2, 4);
    game.move({ from: from, to: to, promotion: 'q' });
    board.position(game.fen());
    updateMoveList();
    checkGameOver();
  }
}

function makeStockfishMove() {
  if (game.game_over()) return;

  const level = parseInt(document.getElementById('levelSelect').value, 10);

  stockfish.onmessage = engineOnMessageForPlay;
  stockfish.postMessage('ucinewgame');
  stockfish.postMessage('isready');
  stockfish.postMessage('position fen ' + game.fen());
  stockfish.postMessage('setoption name Skill Level value ' + level);
  stockfish.postMessage('go depth 10');
}

// --------- Game Over and Resign ---------
function checkGameOver() {
  if (game.game_over()) {
    let resultText = '';
    if (game.in_checkmate()) {
      // If it's user's turn and game is in checkmate, user lost
      resultText = (game.turn() === userColor) ? 'Defeat by Checkmate!' : 'Victory by Checkmate!';
    } else if (game.in_stalemate()) {
      resultText = 'Draw by Stalemate!';
    } else if (game.insufficient_material()) {
      resultText = 'Draw by Insufficient Material!';
    } else if (game.in_threefold_repetition()) {
      resultText = 'Draw by Threefold Repetition!';
    } else {
      resultText = 'Game Over!';
    }
    resultEl.innerText = resultText;
    document.getElementById('analyzeBtn').style.display = 'inline-block';
    document.getElementById('resignBtn').style.display = 'none';
  }
}

function resignGame() {
  if (game.game_over()) return;
  resultEl.innerText = 'You Resigned! Defeat.';
  document.getElementById('analyzeBtn').style.display = 'inline-block';
  document.getElementById('resignBtn').style.display = 'none';
}

// --------- Generate Stockfish Middlegame ---------
function generateStockfishMiddlegame() {
  arrows = [];
  drawArrows();
  resultEl.innerText = '';
  clearHighlights();
  document.getElementById('analyzeBtn').style.display = 'none';
  document.getElementById('resignBtn').style.display = 'inline-block';

  // Reset game and start from initial position
  game.reset();

  // Set orientation based on chosen side
  const side = document.getElementById('sideSelect').value;
  userColor = side;
  board.orientation(side === 'w' ? 'white' : 'black');

  updateMoveList();
  board.position(game.fen());

  const movesToGenerate = 10;
  let generatedMoves = 0;

  function genListener(event) {
    const line = event.data;
    if (typeof line !== 'string') return;
    if (line.startsWith('bestmove')) {
      const moveStr = line.split(' ')[1];
      if (moveStr === '(none)' || moveStr === 'none') {
        stockfish.removeEventListener('message', genListener);
        return;
      }
      const from = moveStr.slice(0, 2);
      const to = moveStr.slice(2, 4);
      game.move({ from: from, to: to, promotion: 'q' });
      board.position(game.fen());
      updateMoveList();
      generatedMoves++;
      if (generatedMoves < movesToGenerate) {
        stockfish.postMessage('position fen ' + game.fen());
        stockfish.postMessage('setoption name Skill Level value 10');
        stockfish.postMessage('go depth 6');
      } else {
        stockfish.removeEventListener('message', genListener);
        // After engine generates 10 plies, it's user's turn
      }
    }
  }

  stockfish.addEventListener('message', genListener);
  stockfish.postMessage('ucinewgame');
  stockfish.postMessage('isready');
  stockfish.postMessage('position fen ' + game.fen());
  stockfish.postMessage('setoption name Skill Level value 10');
  stockfish.postMessage('go depth 6');
}

// --------- Analyze Current Position ---------
function analyzeCurrentPosition() {
  if (!stockfish) return;

  stockfish.onmessage = function(e) {
    const line = e.data;
    if (typeof line !== 'string') return;
    if (line.startsWith('bestmove')) {
      const best = line.split(' ')[1];
      alert('Best move: ' + best);
    }
  };

  stockfish.postMessage('ucinewgame');
  stockfish.postMessage('isready');
  stockfish.postMessage('position fen ' + game.fen());
  stockfish.postMessage('go depth 15');
}

// --------- Event Listeners ---------
document.getElementById('generateStockfishBtn').addEventListener('click', generateStockfishMiddlegame);
document.getElementById('resignBtn').addEventListener('click', resignGame);
document.getElementById('sideSelect').addEventListener('change', e => {
  userColor = e.target.value;
  board.orientation(userColor === 'w' ? 'white' : 'black');
});
document.getElementById('analyzeBtn').addEventListener('click', analyzeCurrentPosition);

// --------- Init ---------
initStockfish();
initBoard();
</script>

</body>
</html>
